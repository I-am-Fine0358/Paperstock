    - preload.js
    - lib/**/*
    - src/**/*
    - node_modules/**/*
    - '!node_modules/**/*.map'
    - '!node_modules/**/*.md'
    - '!node_modules/**/test/**'
    - '!node_modules/**/docs/**'
