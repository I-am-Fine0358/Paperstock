<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paperstock</title>
  <link rel="stylesheet" href="css/index.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- ═══ Tab Bar (vertical) ═══ -->
  <div id="tab-bar">
    <div class="tab-bar-top">
      <button class="tab-item active" data-tab-id="bookshelf" id="tab-bookshelf" title="本棚">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span class="tab-label">本棚</span>
      </button>
    </div>
    <div class="tab-bar-divider"></div>
    <div id="tab-groups-container" class="tab-groups-container">
      <!-- Tab groups + PDF tabs rendered here -->
    </div>
    <div class="tab-bar-bottom">
      <button class="tab-bar-action" id="btn-new-group" title="新しいグループ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        <span>グループ追加</span>
      </button>
    </div>
  </div>

  <!-- ═══ Content Area ═══ -->
  <div id="content-area">

    <!-- ── Bookshelf View ── -->
    <div id="bookshelf-view" class="view-panel active">
      <aside id="sidebar">
        <div class="sidebar-header">
          <h1 class="app-title">Paperstock</h1>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-filter="all" id="nav-all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span>すべての本</span>
          </button>
          <button class="nav-item" data-filter="recent" id="nav-recent">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>最近追加</span>
          </button>
          <button class="nav-item" data-filter="recent-opened" id="nav-recent-opened">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <span>最近読んだ本</span>
          </button>
          <button class="nav-item" data-filter="favorites" id="nav-favorites">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>お気に入り</span>
          </button>
        </nav>
        <div class="sidebar-section">
          <div class="section-header">
            <h2>ステータス</h2>
          </div>
          <nav class="sidebar-nav status-nav">
            <button class="nav-item" data-filter="status-unread" id="nav-status-unread">
              <span class="status-dot unread"></span>
              <span>未読</span>
            </button>
            <button class="nav-item" data-filter="status-reading" id="nav-status-reading">
              <span class="status-dot reading"></span>
              <span>読書中</span>
            </button>
            <button class="nav-item" data-filter="status-completed" id="nav-status-completed">
              <span class="status-dot completed"></span>
              <span>読了</span>
            </button>
          </nav>
        </div>
        <div class="sidebar-section">
          <div class="section-header">
            <h2>タグ</h2>
            <button class="btn-icon" id="btn-add-tag" title="タグを追加">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
          <div id="tag-list" class="tag-list"></div>
        </div>
      </aside>

      <main id="main-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <h2 id="view-title">すべての本</h2>
            <span id="book-count" class="book-count"></span>
            <div class="view-mode-btns">
              <button class="view-mode-btn active" id="btn-view-grid" title="グリッド表示">グリッド</button>
              <button class="view-mode-btn" id="btn-view-list" title="リスト表示">リスト</button>
              <button class="view-mode-btn" id="btn-view-stacks" title="スタック表示">スタック</button>
            </div>
            <div class="sort-dropdown-wrap">
              <select id="sort-select" class="sort-select">
                <option value="updated_at">更新日</option>
                <option value="title">タイトル</option>
                <option value="created_at">追加日</option>
                <option value="page_count">ページ数</option>
                <option value="status">ステータス</option>
              </select>
            </div>
          </div>
          <div class="toolbar-right">
            <div class="search-box">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input type="text" id="search-input" placeholder="検索…" />
            </div>
            <div class="zoom-slider-group">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                opacity="0.5">
                <rect x="2" y="2" width="20" height="20" rx="3" />
              </svg>
              <input type="range" id="bookshelf-zoom" class="zoom-slider" min="100" max="300" value="150" step="10"
                title="カードサイズ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                opacity="0.5">
                <rect x="2" y="2" width="20" height="20" rx="3" />
              </svg>
            </div>
            <button class="btn-primary" id="btn-add-books">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              <span>追加</span>
            </button>
          </div>
        </div>
        <div id="book-grid" class="book-grid"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <div class="empty-icon">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
          </div>
          <h3>本棚は空です</h3>
          <p>PDFファイルをドラッグ＆ドロップ、<br>または「追加」ボタンから追加してください</p>
        </div>
        <div id="drop-overlay" class="drop-overlay">
          <div class="drop-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p>PDFをドロップして追加</p>
          </div>
        </div>
      </main>
    </div>

    <!-- ── PDF Viewer View ── -->
    <div id="viewer-view" class="view-panel">
      <div class="viewer-toolbar" id="viewer-toolbar">
        <div class="vtoolbar-section vtoolbar-left">
          <span class="viewer-title" id="viewer-title"></span>
        </div>
        <div class="vtoolbar-section vtoolbar-center">
          <button class="tool-btn" id="btn-prev" title="前のページ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <div class="page-indicator">
            <input type="number" id="page-input" min="1" value="1">
            <span>/</span>
            <span id="page-total">0</span>
          </div>
          <button class="tool-btn" id="btn-next" title="次のページ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
          <div class="vtoolbar-divider"></div>
          <!-- Spread mode -->
          <button class="tool-btn" id="btn-spread" title="見開き表示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="8" height="18" rx="1" />
              <rect x="14" y="3" width="8" height="18" rx="1" />
            </svg>
          </button>
          <!-- Scroll direction -->
          <button class="tool-btn" id="btn-scroll-dir" title="スクロール方向を切替">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19" />
              <polyline points="19 12 12 19 5 12" />
            </svg>
          </button>
        </div>
        <div class="vtoolbar-section vtoolbar-right">
          <div class="viewer-zoom-slider-group">
            <button class="tool-btn tool-btn-sm" id="btn-zoom-out" title="縮小">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
            <input type="range" id="viewer-zoom-slider" class="viewer-zoom-slider" min="30" max="500" value="100"
              step="5">
            <button class="tool-btn tool-btn-sm" id="btn-zoom-in" title="拡大">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
            <span class="zoom-level" id="zoom-level">100%</span>
          </div>
          <button class="tool-btn" id="btn-fit" title="縦に合わせる">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
          </button>
          <div class="vtoolbar-divider"></div>
          <!-- Bookmark -->
          <div class="bookmark-btn-wrap">
            <button class="tool-btn" id="btn-bookmark" title="栞を挿む">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
              </svg>
            </button>
            <button class="tool-btn tool-btn-sm" id="btn-bookmark-list" title="栞一覧">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>
          </div>
          <!-- Comment mode -->
          <button class="tool-btn" id="btn-comment-mode" title="コメントモード">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </button>
          <button class="tool-btn" id="btn-thumbnails" title="サムネイル">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
        </div>
      </div>
      <div class="viewer-body">
        <aside class="viewer-sidebar" id="viewer-sidebar">
          <div id="thumbnail-list" class="thumbnail-list"></div>
        </aside>
        <div class="viewer-container" id="viewer-container">
          <div class="viewer-pages" id="viewer-pages"></div>
        </div>
      </div>
      <div class="viewer-loading" id="viewer-loading" style="display:none;">
        <div class="loading-spinner-v"></div>
        <p>PDFを読み込み中…</p>
      </div>
    </div>
  </div>

  <!-- ═══ Comment Popup ═══ -->
  <div id="comment-popup" class="comment-popup" style="display:none;">
    <div class="comment-popup-header">
      <span class="comment-popup-page"></span>
      <button class="comment-popup-delete" id="comment-delete" title="削除">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
      </button>
    </div>
    <textarea id="comment-text" placeholder="コメントを入力…" rows="3"></textarea>
    <div class="comment-popup-footer">
      <button class="btn-secondary btn-sm" id="comment-cancel">キャンセル</button>
      <button class="btn-primary btn-sm" id="comment-save">保存</button>
    </div>
  </div>

  <!-- ═══ Context Menu ═══ -->
  <div id="context-menu" class="context-menu" style="display:none;">
    <button data-action="open">開く</button>
    <button data-action="rename">名前を変更</button>
    <hr>
    <div class="context-submenu">
      <span class="context-submenu-label">ステータス</span>
      <button data-action="status-unread">○ 未読</button>
      <button data-action="status-reading">📖 読書中</button>
      <button data-action="status-completed">✅ 読了</button>
    </div>
    <hr>
    <button data-action="set-cover">カバー画像を変更…</button>
    <button data-action="manage-tags">タグを編集…</button>
    <hr>
    <button data-action="show-in-finder">Finderで表示</button>
    <hr>
    <button data-action="notion-open">Notionで開く</button>
    <button data-action="notion-sync">Notionに同期</button>
    <hr>
    <button data-action="delete" class="danger">ライブラリから削除</button>
  </div>

  <!-- ═══ Bookmark Dropdown ═══ -->
  <div id="bookmark-dropdown" class="bookmark-dropdown" style="display:none;">
    <div class="bookmark-dropdown-header">栞 一覧</div>
    <div id="bookmark-list" class="bookmark-list"></div>
    <div class="bookmark-empty" id="bookmark-empty">栞がありません</div>
  </div>

  <!-- ═══ Tab Context Menu ═══ -->
  <div id="tab-context-menu" class="context-menu" style="display:none;">
    <button data-action="close-tab">タブを閉じる</button>
    <button data-action="close-other-tabs">他のタブを閉じる</button>
    <hr>
    <button data-action="move-to-group">グループに移動…</button>
    <button data-action="remove-from-group">グループから外す</button>
  </div>

  <!-- ═══ Group Name Modal ═══ -->
  <div id="group-modal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="group-modal-title">新しいグループ</h3>
        <button class="btn-icon modal-close" id="group-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <label>グループ名</label>
        <input type="text" id="group-name-input" placeholder="グループ名…" />
        <label>カラー</label>
        <div id="group-color-palette" class="color-palette"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="group-modal-cancel">キャンセル</button>
        <button class="btn-primary" id="group-modal-save">追加</button>
      </div>
    </div>
  </div>

  <!-- ═══ Move to Group Modal ═══ -->
  <div id="move-group-modal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>グループに移動</h3>
        <button class="btn-icon modal-close" id="move-group-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body" id="move-group-list"></div>
    </div>
  </div>

  <!-- ═══ Tag Modal ═══ -->
  <div id="tag-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="tag-modal-title">タグを追加</h3>
        <button class="btn-icon modal-close" id="tag-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <label>タグ名</label>
        <input type="text" id="tag-name-input" placeholder="タグ名を入力…" />
        <label>カラー</label>
        <div id="color-palette" class="color-palette"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="tag-modal-cancel">キャンセル</button>
        <button class="btn-primary" id="tag-modal-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ Tag Assign Modal ═══ -->
  <div id="tag-assign-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>タグを編集</h3>
        <button class="btn-icon modal-close" id="tag-assign-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="tag-assign-list" class="tag-assign-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="tag-assign-done">完了</button>
      </div>
    </div>
  </div>

  <!-- ═══ Rename Modal ═══ -->
  <div id="rename-modal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>名前を変更</h3>
        <button class="btn-icon modal-close" id="rename-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="text" id="rename-input" placeholder="新しいタイトル…" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="rename-cancel">キャンセル</button>
        <button class="btn-primary" id="rename-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ Settings Modal ═══ -->
  <div id="settings-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>設定</h3>
        <button class="btn-icon modal-close" id="settings-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-section-title">Notion 読書ログ連携</div>
        <div class="setting-row">
          <div class="setting-label-wrap">
            <label>Notion連携を有効にする</label>
            <span class="setting-desc">ステータス変更時に自動でNotionに同期します</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="setting-notion-sync" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-row setting-row-vertical">
          <label>Notion Integration Token</label>
          <input type="password" id="setting-notion-token" class="setting-input" placeholder="ntn_..." />
        </div>
        <div class="setting-row setting-row-vertical">
          <label>読書ログページID</label>
          <span class="setting-desc">NotionのページURLの末尾32文字（例: 3363cf7d2af8804d8516e1e96730c552）</span>
          <input type="text" id="setting-notion-page-id" class="setting-input" placeholder="ページID..." />
        </div>
        <div class="setting-row setting-row-actions">
